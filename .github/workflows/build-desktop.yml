name: Build Desktop Installers

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: excel-ai-mapper-windows-x64
          path: |
            release/*.exe
            release/*.yml
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS installers
        run: npx electron-builder --mac dmg --x64 --arm64 --publish never

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: excel-ai-mapper-macos
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 14
